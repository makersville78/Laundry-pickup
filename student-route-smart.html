<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Laundry Route</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: #000;
    margin: 0;
    padding: 20px;
    background: #fff;
  }
  h1 {
    font-size: 32px;
    margin: 0 0 4px;
    text-align: center;
  }
  .day-banner {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    background: #000;
    color: #fff;
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .stop {
    border: 3px solid #000;
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 18px;
    border-radius: 12px;
    background: #fff;
    transition: background 0.2s;
  }
  .stop.done {
    background: #e6ffe6;
  }
  .room-block { flex: 1; }
  .room-label {
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: bold;
  }
  .room-num {
    font-size: 64px;
    font-weight: bold;
    line-height: 1;
  }
  .check-box {
    width: 72px;
    height: 72px;
    border: 4px solid #000;
    border-radius: 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .check-box.checked::after {
    content: "✓";
    font-size: 56px;
    font-weight: bold;
    color: #000;
    line-height: 1;
  }
  .check-label {
    font-size: 14px;
    text-align: center;
    margin-top: 4px;
    font-weight: bold;
  }
  .check-wrap { display: flex; flex-direction: column; align-items: center; }

  .weekend-notice {
    border: 3px dashed #000;
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    border-radius: 12px;
    background: #fffbe6;
  }
  .weekend-notice .big {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .weekend-notice .small {
    font-size: 14px;
  }

  .reset-btn {
    display: block;
    margin: 20px auto 0;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: bold;
    background: #fff;
    border: 2px solid #000;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>MY LAUNDRY ROUTE</h1>
<div id="day-banner" class="day-banner"></div>

<div id="weekend" class="weekend-notice" style="display:none">
  <div class="big">No laundry pickup today!</div>
  <div class="small">Here's a preview of Monday's route:</div>
</div>

<div id="route"></div>

<button class="reset-btn" onclick="resetChecks()">Reset Check Marks</button>

<script>
  const SCHEDULE = {
    Monday:    [108, 228, 222, 234, 220],
    Tuesday:   [124, 226, 238, 224, 230],
    Wednesday: [123, 227, 220, 236, 229],
    Thursday:  [126, 234, 221, 226, 238],
    Friday:    [108, 224, 230, 222, 228]
  };

  const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function render() {
    const today = new Date();
    const dayName = DAY_NAMES[today.getDay()];
    const dateStr = MONTH_NAMES[today.getMonth()] + " " + today.getDate();

    const isWeekday = SCHEDULE.hasOwnProperty(dayName);
    const rooms = isWeekday ? SCHEDULE[dayName] : SCHEDULE.Monday;

    document.getElementById("day-banner").textContent = dayName + " · " + dateStr;

    if (!isWeekday) {
      document.getElementById("weekend").style.display = "block";
    }

    const routeEl = document.getElementById("route");
    routeEl.innerHTML = "";
    rooms.forEach((roomNum, i) => {
      const stop = document.createElement("div");
      stop.className = "stop";
      stop.innerHTML = `
        <div class="room-block">
          <div class="room-label">Go to room</div>
          <div class="room-num">${roomNum}</div>
        </div>
        <div class="check-wrap">
          <div class="check-box" onclick="toggleCheck(this)"></div>
          <div class="check-label">GOT IT!</div>
        </div>
      `;
      routeEl.appendChild(stop);
    });
  }

  function toggleCheck(el) {
    el.classList.toggle("checked");
    el.closest(".stop").classList.toggle("done");
  }

  function resetChecks() {
    document.querySelectorAll(".check-box.checked").forEach(b => b.classList.remove("checked"));
    document.querySelectorAll(".stop.done").forEach(s => s.classList.remove("done"));
  }

  render();
</script>

</body>
</html>
