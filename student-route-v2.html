<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Laundry Route — v2</title>
<style>
  @page { size: letter; margin: 0.4in; }
  * { box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; color: #000; margin: 0; padding: 16px; }
  h1 { font-size: 30px; margin: 0 0 6px; text-align: center; }
  .name-row { display: flex; gap: 16px; border: 3px solid #000; padding: 10px; margin-bottom: 16px; font-size: 18px; align-items: center; }
  .name-row label { font-weight: bold; }
  .blank-line { display: inline-block; border-bottom: 2px solid #000; min-width: 200px; height: 26px; }
  .stop {
    border: 3px solid #000;
    padding: 14px 18px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    page-break-inside: avoid;
  }
  .room-block { flex: 1; }
  .room-label { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
  .room-num { font-size: 64px; font-weight: bold; line-height: 1; }
  .check-box {
    width: 70px;
    height: 70px;
    border: 4px solid #000;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .check-label { font-size: 14px; text-align: center; margin-top: 4px; font-weight: bold; }
  .check-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<h1>MY LAUNDRY ROUTE</h1>

<div class="name-row">
  <label>NAME:</label> <span class="blank-line"></span>
  <label>DATE:</label> <span class="blank-line"></span>
</div>

<div class="stop">
  <div class="room-block">
    <div class="room-label">Go to room</div>
    <div class="room-num">126</div>
  </div>
  <div class="check-wrap">
    <div class="check-box"></div>
    <div class="check-label">GOT IT!</div>
  </div>
</div>

<div class="stop">
  <div class="room-block">
    <div class="room-label">Go to room</div>
    <div class="room-num">234</div>
  </div>
  <div class="check-wrap">
    <div class="check-box"></div>
    <div class="check-label">GOT IT!</div>
  </div>
</div>

<div class="stop">
  <div class="room-block">
    <div class="room-label">Go to room</div>
    <div class="room-num">221</div>
  </div>
  <div class="check-wrap">
    <div class="check-box"></div>
    <div class="check-label">GOT IT!</div>
  </div>
</div>

<div class="stop">
  <div class="room-block">
    <div class="room-label">Go to room</div>
    <div class="room-num">226</div>
  </div>
  <div class="check-wrap">
    <div class="check-box"></div>
    <div class="check-label">GOT IT!</div>
  </div>
</div>

<div class="stop">
  <div class="room-block">
    <div class="room-label">Go to room</div>
    <div class="room-num">238</div>
  </div>
  <div class="check-wrap">
    <div class="check-box"></div>
    <div class="check-label">GOT IT!</div>
  </div>
</div>

</body>
</html>
